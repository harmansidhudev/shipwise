  #
  #     - name: Setup pnpm
  #       uses: pnpm/action-setup@v4
  #       with:
  #         version: ${{ env.PNPM_VERSION }}
  #
  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: ${{ env.NODE_VERSION }}
  #         cache: "pnpm"
  #
  #     - name: Install dependencies
  #       run: pnpm install --frozen-lockfile
  #
  #     - name: Configure AWS credentials (OIDC)
  #       uses: aws-actions/configure-aws-credentials@v4
  #       with:
  #         role-to-assume: ${{ secrets.AWS_ROLE_ARN }}  # [CUSTOMIZE]
  #         aws-region: ${{ env.AWS_REGION }}
  #
  #     - name: Deploy to production
  #       if: github.ref == 'refs/heads/main'
  #       run: pnpm exec sst deploy --stage prod
  #
  #     - name: Deploy to staging
  #       if: github.ref == 'refs/heads/staging'
  #       run: pnpm exec sst deploy --stage staging

  # ============================================================
  # Job 2b: Deploy with Docker + ECS Fargate
  # ============================================================
  deploy-ecs:
    name: Deploy (ECS)
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}  # [CUSTOMIZE]
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image
        run: |
          IMAGE_TAG="${{ github.sha }}"
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          ECR_REPOSITORY="${{ vars.ECR_REPOSITORY }}"  # [CUSTOMIZE] Set in repo variables
          echo "tag=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "latest=${ECR_REGISTRY}/${ECR_REPOSITORY}:latest" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=${{ vars.APP_URL }} \
            --tag ${{ steps.image.outputs.tag }} \
            --tag ${{ steps.image.outputs.latest }} \
            .
        # [CUSTOMIZE] Add --build-arg for any build-time env vars

      - name: Push Docker image
        run: |
          docker push ${{ steps.image.outputs.tag }}
          docker push ${{ steps.image.outputs.latest }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars.ECS_SERVICE }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ vars.ECR_REPOSITORY }}  # [CUSTOMIZE] Container name in task def
          image: ${{ steps.image.outputs.tag }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE }}         # [CUSTOMIZE] Set in repo variables
          cluster: ${{ vars.ECS_CLUSTER }}         # [CUSTOMIZE] Set in repo variables
          wait-for-service-stability: true

      # --- Run database migrations after deploy ---
      - name: Run production migrations
        if: github.ref == 'refs/heads/main'
        run: |
          # Run migration as a one-off ECS task
          aws ecs run-task \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --task-definition ${{ steps.task-def.outputs.task-definition }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ vars.PRIVATE_SUBNETS }}],securityGroups=[${{ vars.APP_SECURITY_GROUP }}]}" \
            --overrides '{"containerOverrides":[{"name":"${{ vars.ECR_REPOSITORY }}","command":["npx","prisma","migrate","deploy"]}]}'
        # [CUSTOMIZE] Adjust migration command for your ORM

  # ============================================================
  # Job 3: Security scanning
  # ============================================================
  security:
    name: Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Docker image vulnerability scan ---
      # Uncomment if using Docker deployment
