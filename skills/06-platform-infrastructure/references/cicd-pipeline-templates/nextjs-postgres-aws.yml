# Next.js + Postgres + AWS Deployment Pipeline (via SST or Docker/ECS)
# Copy to: .github/workflows/ci.yml
#
# [CUSTOMIZE] Search for [CUSTOMIZE] comments and update values.
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN        — IAM role ARN for OIDC (see secrets-management.md)
#   DATABASE_URL        — Postgres connection string for test database
#
# Required GitHub Variables (Settings → Variables):
#   AWS_REGION          — e.g., us-east-1
#   ECR_REPOSITORY      — e.g., myapp-prod
#   ECS_CLUSTER         — e.g., myapp-prod
#   ECS_SERVICE          — e.g., myapp-prod-web
#
# Branch strategy:
#   main     → production deploy
#   staging  → staging deploy
#   feat/*   → CI only (no deploy)
#
# Deploy method: This template supports two approaches:
#   1. SST (recommended for serverless Next.js on AWS) — uncomment SST steps
#   2. Docker + ECS Fargate — uncomment ECS steps

name: CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"           # [CUSTOMIZE] Node.js version
  PNPM_VERSION: "9"            # [CUSTOMIZE] pnpm version
  AWS_REGION: us-east-1        # [CUSTOMIZE] AWS region

permissions:
  id-token: write    # Required for OIDC auth with AWS
  contents: read
  packages: write    # Required for pushing Docker images

jobs:
  # ============================================================
  # Job 1: Lint, typecheck, test, build
  # ============================================================
  ci:
    name: CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine  # [CUSTOMIZE] Match your production Postgres version
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- Lint ---
      - name: Lint
        run: pnpm lint

      # --- Typecheck ---
      - name: Typecheck
        run: pnpm exec tsc --noEmit

      # --- Test ---
      - name: Run database migrations
        run: pnpm exec prisma migrate deploy
        # [CUSTOMIZE] If using Drizzle: pnpm exec drizzle-kit push

      - name: Test
        run: pnpm test

      # --- Build (verify it compiles) ---
      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_APP_URL: https://example.com  # [CUSTOMIZE]
          NEXT_TELEMETRY_DISABLED: 1

  # ============================================================
  # Job 2a: Deploy with SST (Serverless — recommended)
  # ============================================================
  # Uncomment this job if using SST for deployment.
  # SST deploys Next.js to Lambda@Edge + CloudFront + S3.

  # deploy-sst:
  #   name: Deploy (SST)
