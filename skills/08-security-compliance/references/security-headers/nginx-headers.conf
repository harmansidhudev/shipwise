# Nginx Security Headers, SSL Configuration, and Rate Limiting
#
# Usage: Include this in your server block or copy relevant sections.
#   include /etc/nginx/snippets/security-headers.conf;
#
# [CUSTOMIZE] Search for [CUSTOMIZE] markers and adjust for your app.
# Test your config: nginx -t
# Reload after changes: nginx -s reload

# ---------------------------------------------------------------------------
# 1. Rate Limiting Zones (place in http {} block, OUTSIDE server {})
# ---------------------------------------------------------------------------

# [CUSTOMIZE] Adjust rates based on your traffic patterns
# General API rate limit: 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Auth endpoint rate limit: 5 requests/minute per IP
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# Password reset rate limit: 3 requests per 15 minutes per IP
limit_req_zone $binary_remote_addr zone=reset_limit:10m rate=3r/m;

# Connection limit per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ---------------------------------------------------------------------------
# 2. Server Block
# ---------------------------------------------------------------------------

server {
    # [CUSTOMIZE] Replace with your domain
    server_name your-domain.com www.your-domain.com;

    # -----------------------------------------------------------------------
    # SSL / TLS Configuration
    # -----------------------------------------------------------------------

    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # [CUSTOMIZE] Paths to your SSL certificates
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Modern TLS configuration (TLS 1.2+ only)
    ssl_protocols TLSv1.2 TLSv1.3;

    # [CUSTOMIZE] Use Mozilla's recommended cipher suites
    # https://ssl-config.mozilla.org/
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling — faster TLS handshakes
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # SSL session caching for performance
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # DH parameters for DHE cipher suites
    # Generate: openssl dhparam -out /etc/nginx/dhparam.pem 2048
    # ssl_dhparam /etc/nginx/dhparam.pem;   # [CUSTOMIZE] Uncomment after generating

    # -----------------------------------------------------------------------
    # Security Headers
    # -----------------------------------------------------------------------

    # Content Security Policy
    # [CUSTOMIZE] Add trusted domains for scripts, styles, images, etc.
    # For nonce-based CSP with a dynamic backend, set CSP in your app instead.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;

    # HSTS: Force HTTPS for 1 year, include subdomains, allow preload
    # [CUSTOMIZE] Remove preload until you've verified HTTPS on all subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent clickjacking — block all framing
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Control referrer information sent to other sites
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restrict browser features
    # [CUSTOMIZE] Enable features your app needs (e.g., remove camera=() if you use webcam)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), usb=(), bluetooth=(), serial=()" always;

    # XSS filter for older browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Cross-origin policies
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Remove server version information (information disclosure)
    server_tokens off;

    # -----------------------------------------------------------------------
    # Rate Limiting Application
    # -----------------------------------------------------------------------

    # General API endpoints
    # [CUSTOMIZE] Adjust burst and paths to match your API structure
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 50;

        # [CUSTOMIZE] Your upstream app server
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints — strict rate limiting
    location /api/auth/login {
        limit_req zone=auth_limit burst=2 nodelay;
        limit_conn conn_limit 5;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/register {
        limit_req zone=auth_limit burst=2 nodelay;
        limit_conn conn_limit 5;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/forgot-password {
        limit_req zone=reset_limit burst=1 nodelay;
        limit_conn conn_limit 3;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # Static Files
    # -----------------------------------------------------------------------

    # [CUSTOMIZE] Adjust root path and cache durations
    location /static/ {
        alias /var/www/your-app/static/;       # [CUSTOMIZE]
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -----------------------------------------------------------------------
    # Security: Block common attack vectors
    # -----------------------------------------------------------------------

    # Block access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Block access to backup files
    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist|old|orig)$ {
        deny all;
        return 404;
    }

    # Block PHP execution (if you're not running PHP)
    location ~* \.php$ {
        deny all;
        return 404;
    }

    # Limit request body size (prevent large upload attacks)
    # [CUSTOMIZE] Adjust based on your file upload requirements
    client_max_body_size 10m;

    # -----------------------------------------------------------------------
    # Default location — proxy to app
    # -----------------------------------------------------------------------

    location / {
        proxy_pass http://127.0.0.1:3000;     # [CUSTOMIZE] Your app server
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed)
        # [CUSTOMIZE] Uncomment if your app uses WebSockets
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";
    }
}

# ---------------------------------------------------------------------------
# 3. HTTP to HTTPS Redirect
# ---------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;   # [CUSTOMIZE]

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------------
# Verification
# ---------------------------------------------------------------------------
# After deploying, verify:
#   1. Test config: nginx -t
#   2. Check headers: curl -I https://your-domain.com
#   3. SSL test: https://www.ssllabs.com/ssltest/
#   4. Security headers: https://securityheaders.com
#   5. Mozilla Observatory: https://observatory.mozilla.org
